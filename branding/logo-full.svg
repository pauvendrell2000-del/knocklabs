<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&amp;display=swap');
    </style>
  </defs>
  <!-- Background: dark -->
  <rect width="480" height="120" fill="#0D0D0D"/>

  <!-- Badge box -->
  <rect x="24" y="20" width="76" height="32" fill="#F2F0EB"/>
  <text
    x="62"
    y="41"
    font-family="Archivo, sans-serif"
    font-weight="900"
    font-size="14"
    fill="#0D0D0D"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-0.06em"
  >KNOCK</text>

  <!-- LABS -->
  <text
    x="112"
    y="42"
    font-family="Archivo, sans-serif"
    font-weight="900"
    font-size="20"
    fill="#F2F0EB"
    text-anchor="start"
    dominant-baseline="auto"
    letter-spacing="-0.035em"
  >LABS</text>

  <!-- Divider line -->
  <rect x="24" y="64" width="432" height="1" fill="#F2F0EB" opacity="0.08"/>

  <!-- Tagline -->
  <text
    x="24"
    y="88"
    font-family="DM Mono, monospace"
    font-weight="400"
    font-size="10"
    fill="#F2F0EB"
    text-anchor="start"
    dominant-baseline="auto"
    letter-spacing="0.16em"
    opacity="0.35"
  >CREATIVE STUDIO · MADRID</text>

  <!-- Accent dot -->
  <circle cx="456" cy="84" r="4" fill="#FF4C00"/>
</svg>
